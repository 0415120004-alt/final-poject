<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Pet App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>My Virtual Pet</h1>
        
        <div class="pet-display">
            <div id="pet" class="pet">🐱</div>
            <p id="pet-name">Buddy</p>
            <p id="status-message">Your pet is ready to play!</p>
        </div>

        <div class="stats">
            <div class="stat">
                <label>Hunger:</label>
                <div class="stat-bar">
                    <div id="hunger-bar" class="stat-fill"></div>
                </div>
                <span id="hunger-value">50</span>
            </div>
            
            <div class="stat">
                <label>Happiness:</label>
                <div class="stat-bar">
                    <div id="happiness-bar" class="stat-fill"></div>
                </div>
                <span id="happiness-value">50</span>
            </div>
            
            <div class="stat">
                <label>Energy:</label>
                <div class="stat-bar">
                    <div id="energy-bar" class="stat-fill"></div>
                </div>
                <span id="energy-value">50</span>
            </div>
        </div>

        <div class="buttons">
            <button id="feed-btn">Feed Pet</button>
            <button id="play-btn">Play with Pet</button>
            <button id="sleep-btn">Let Pet Sleep</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
